name: "Docs / Build PR"
# For more information,
# see https://sphinx-theme.scylladb.com/stable/deployment/production.html#available-workflows

on:
  push:
    paths:
      - "docs/**"
      - ".github/workflows/docs-pr.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pr.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        # actions/setup-python@v6 poetry cache feature requires poetry to be installed beforehand
        # which makes use of it extremely awkward.
        with:
          path: |
            /home/runner/.cache/pip
            /home/runner/.cache/uv
          key: docs-cache-${{ runner.os }}-${{ hashFiles('docs/pyproject.toml', 'docs/Makefile') }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up env
        run: make -C docs setupenv

      - name: Build docs
        run: make -C docs test
