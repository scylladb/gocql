name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
      - uses: actions/cache@v4
        id: gomod-cache
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run linters
        run: make check

      - name: Run unit tests
        run: | 
          make generate-pki

      - name: Run unit tests
        run: |
          echo "#### Unit tests" >> $GITHUB_STEP_SUMMARY
          make test-unit | tee $GITHUB_STEP_SUMMARY
          echo "#### End of unit tests" >> $GITHUB_STEP_SUMMARY

      - name: Run unit tests
        run: |
          echo "#### Unit tests" >> $GITHUB_STEP_SUMMARY
          make test-unit | tee $GITHUB_STEP_SUMMARY
          echo "#### End of unit tests" >> $GITHUB_STEP_SUMMARY

      - name: Run unit tests
        run: |
          echo "#### Unit tests" >> $GITHUB_STEP_SUMMARY
          make test-unit | tee $GITHUB_STEP_SUMMARY
          echo "#### End of unit tests" >> $GITHUB_STEP_SUMMARY

